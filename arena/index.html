<!DOCTYPE html>

<body class="keynote-deck">
  <a class="skip-link" href="#slide-1">Skip to deck</a>
  <div class="deck-progress" aria-hidden="true"><span class="deck-progress__bar" id="deck-progress-bar"></span></div>
  <header class="deck-topbar" aria-label="Deck header">
    <a href="/">What are we capable of?</a>
    <span class="deck-topbar__title">Are.na for SAIA</span>
    <span id="slide-count" aria-live="polite">1 of 10</span>
  </header>

  <main class="deck deck--keynote" id="deck" tabindex="-1">
    <section class="slide slide--keynote" id="slide-1" data-slide="1" aria-labelledby="slide-1-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-01.png" alt="Slide 1: Are.na **" width="1920" height="1080" loading="eager">
        <figcaption class="slide-transcript" aria-label="Slide 1 text">
          <h2 id="slide-1-title">Are.na **</h2>
            <p>A tool for internet archaeologists like us.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
            <p class="slide-transcript__meta">Are.na Homepage 06 10 26</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-2" data-slide="2" aria-labelledby="slide-2-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-02.png" alt="Slide 2: The internet is abundance." width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 2 text">
          <h2 id="slide-2-title">The internet is abundance.</h2>
            <p>It gives us more material than any one person can hold.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
            <p class="slide-transcript__meta">Block #6368846</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-3" data-slide="3" aria-labelledby="slide-3-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-03.png" alt="Slide 3: We can collect what matters." width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 3 text">
          <h2 id="slide-3-title">We can collect what matters.</h2>
            <p>Are.na is described as online software for saving and organizing content that is important to you.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
            <p class="slide-transcript__meta">Block #40003580</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-4" data-slide="4" aria-labelledby="slide-4-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-04.png" alt="Slide 4: Blocks. Channels. Connections." width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 4 text">
          <h2 id="slide-4-title">Blocks. Channels. Connections.</h2>
            <p>A block is a single object. Channels are a place where blocks gather around ideas. Connections are the links that let blocks travel between channels.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
            <p class="slide-transcript__meta">Block #18017853</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-5" data-slide="5" aria-labelledby="slide-5-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-05.png" alt="Slide 5: What is a block?" width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 5 text">
          <h2 id="slide-5-title">What is a block?</h2>
            <p>A block can be a link, an image, text, a video, a PDF, a file or an embed. A block can sit in several channels, possibly meaning something different in each one.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-6" data-slide="6" aria-labelledby="slide-6-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-06.png" alt="Slide 6: What is a channel?" width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 6 text">
          <h2 id="slide-6-title">What is a channel?</h2>
            <p>A channel is a place where blocks gather around an idea. It may be specific, or fuzzy: a research topic, a visual mood, a question, a project, a collection of sources or references, or something you keep noticing but can’t quite explain yet.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-7" data-slide="7" aria-labelledby="slide-7-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-07.png" alt="Slide 7: Three types of channels." width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 7 text">
          <h2 id="slide-7-title">Three types of channels.</h2>
            <p>Public, private and open.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-8" data-slide="8" aria-labelledby="slide-8-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-08.png" alt="Slide 8: How do you describe Are.na at a party?" width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 8 text">
          <h2 id="slide-8-title">How do you describe Are.na at a party?</h2>
            <p>A channel authored by the community.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-9" data-slide="9" aria-labelledby="slide-9-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-09.png" alt="Slide 9: Let’s create a channel." width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 9 text">
          <h2 id="slide-9-title">Let’s create a channel.</h2>
            <p>Choose an idea from your head. Are.na works best when we collect publicly, but open, public or private is up to you.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
        </figcaption>
      </figure>
    </section>
    <section class="slide slide--keynote" id="slide-10" data-slide="10" aria-labelledby="slide-10-title">
      <figure class="slide-figure">
        <img src="/arena/assets/keynote/slide-10.png" alt="Slide 10: Collect from where you are." width="1920" height="1080" loading="lazy">
        <figcaption class="slide-transcript" aria-label="Slide 10 text">
          <h2 id="slide-10-title">Collect from where you are.</h2>
            <p>Install the browser extension. Save a link, save some text, save an image. Install the iPhone app. Use the share extension in any app.</p>
            <p class="slide-transcript__meta">S.A.I.A #11 : Archipelagic Ideation</p>
        </figcaption>
      </figure>
    </section>
