<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#000000">
<title>Dream Interpreter</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --fg: #e8e4df;
  --fg-dim: rgba(232, 228, 223, 0.85);
  --fg-muted: rgba(232, 228, 223, 0.4);
  --accent: #c4956a;
  --border: rgba(232, 228, 223, 0.1);
  --vv-top: 0px;
  --vv-height: 100vh;
  --input-bottom-padding: max(24px, env(safe-area-inset-bottom, 24px));
}


@supports (height: 100dvh) {
  :root { --vv-height: 100dvh; }
}

html, body {
  height: 100%;
  background-color: var(--bg);
  overflow: hidden;
  overscroll-behavior: none;
  position: fixed;
  inset: 0;
  width: 100%;
  touch-action: none;
}

body {
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 400ms ease, color 400ms ease;
}

#field {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

#grain {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.035;
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

#chat {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: auto;
  height: var(--vv-height);
  transform: translate3d(0, var(--vv-top), 0);
  z-index: 2;
  display: flex;
  flex-direction: column;
  max-width: 640px;
  min-height: 0;
  margin: 0 auto;
  padding: 0 24px;
}

#body {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

#disclosure {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: opacity 500ms ease;
  padding: 0 20px;
}

#disclosure.hidden {
  opacity: 0;
  pointer-events: none;
}

.disclosure-text {
  color: var(--fg-muted);
  font-size: 13px;
  opacity: 0.5;
  max-width: 320px;
  line-height: 1.5;
}

.about-link {
  display: block;
  color: var(--fg-muted);
  font-size: 13px;
  opacity: 0.5;
  text-decoration: none;
  text-align: left;
  padding: 20px 64px 0 0;
  flex-shrink: 0;
  transition: opacity 200ms ease;
}

.about-link:hover {
  opacity: 0.8;
}

#messages {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  scrollbar-width: none;
  -ms-overflow-style: none;
  opacity: 0;
  transition: opacity 400ms ease;
}

#messages::-webkit-scrollbar { display: none; }

#messages.active { opacity: 1; }

#messages-inner {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 40px 0 16px;
}

.msg {
  margin-bottom: 24px;
  white-space: pre-wrap;
  word-wrap: break-word;
  opacity: 0;
  transform: translateY(4px);
  animation: msgIn 300ms ease forwards;
}

.msg-user {
  color: var(--fg);
}

.msg-assistant {
  color: var(--fg-dim);
  padding-left: 16px;
  border-left: 1px solid var(--border);
}

.msg-system {
  color: var(--fg-muted);
  font-size: 14px;
  text-align: center;
  padding: 8px 0;
  border-left: none;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  body { transition: none; }
  .msg { animation: none; opacity: 1; transform: none; }
  #disclosure { transition: none; }
  #messages { transition: none; }
}

@media (max-width: 600px) {
  #chat { padding: 0 20px; }
  .msg { margin-bottom: 18px; }
  .msg-assistant { padding-left: 12px; }
  #messages-inner { padding: 24px 0 12px; }
}

#input-area {
  flex-shrink: 0;
  padding: 12px 0 24px;
  padding-bottom: var(--input-bottom-padding);
}

#input-form {
  border-bottom: 1px solid var(--fg-muted);
}

#input {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--fg);
  font-family: inherit;
  font-size: 16px;
  line-height: 1.6;
  padding: 8px 0;
  resize: none;
  outline: none;
  overflow-y: hidden;
  touch-action: manipulation;
}

#input:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

#input::placeholder {
  color: var(--fg-muted);
}

@media (max-width: 600px) {
  #input-area { padding-top: 16px; }
  #input { padding: 14px 0; }
}
</style>
</head>
<body>

<canvas id="field" aria-hidden="true"></canvas>

<svg id="grain" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" />
  </filter>
  <rect width="100%" height="100%" filter="url(#noise)" />
</svg>

<main id="chat">
  <a href="/dream/about" class="about-link">What am I interacting with?</a>
  <div id="body">
    <div id="disclosure">
      <p class="disclosure-text">This is a well-trained language model<br>and nothing more. Nothing is stored.</p>
    </div>
    <div id="messages" role="log" aria-live="polite" aria-label="Dream conversation">
      <div id="messages-inner"></div>
    </div>
  </div>
  <div id="input-area">
    <form id="input-form" autocomplete="off">
      <label for="input" class="sr-only">Describe your dream</label>
      <textarea id="input" rows="1" placeholder="Describe your dream." aria-label="Describe your dream"></textarea>
    </form>
  </div>
</main>

<script>
(function () {
  var disclosure = document.getElementById('disclosure');
  var messagesEl = document.getElementById('messages');
  var messagesInner = document.getElementById('messages-inner');
  var form = document.getElementById('input-form');
  var input = document.getElementById('input');
  var canvas = document.getElementById('field');
  var root = document.documentElement;
  var chatEl = document.getElementById('chat');
  var bodyEl = document.getElementById('body');
  var inputArea = document.getElementById('input-area');

  var conversation = [];
  var streaming = false;
  var started = false;
  var MESSAGE_LIMIT = 20;
  var CHAR_LIMIT = 12000;
  var DEBUG_VIEWPORT = /(?:^|[?&])debug=(?:viewport|1)(?:&|$)/.test(window.location.search);
  var debugPanel = null;
  var debugPre = null;
  var debugRaf = 0;
  var debugLastSource = 'load';
  var debugHistory = [];
  var ringRgb = '232, 228, 223';

  // ── Canvas ──

  var ctx = canvas.getContext('2d');
  var rings = [];
  var frameTime = 0;
  var animTime = 0;
  var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var mobile = window.innerWidth < 768;
  var FRAME_INTERVAL = 1000 / (mobile ? 24 : 30);
  var vvTop = 0;
  var vvHeight = window.innerHeight;
  var layoutViewportHeight = window.innerHeight;
  var viewportRaf = 0;
  var touchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  var keyboardOpen = false;
  var ringOpacityFactor = 1;
  var ringOpacityTarget = 1;

  function fieldHeight() {
    var h = Math.max(layoutViewportHeight || 0, window.innerHeight || 0);
    if (window.visualViewport) {
      h = Math.max(h, (window.visualViewport.height || 0) + (window.visualViewport.offsetTop || 0));
    }
    return Math.round(h || window.innerHeight || 1);
  }

  function resizeCanvas() {
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth;
    var h = fieldHeight();
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function initRings() {
    var count = mobile ? 8 : 14;
    rings = [];
    for (var i = 0; i < count; i++) {
      var t = count > 1 ? i / (count - 1) : 0;
      rings.push({
        base: 40 + i * 45,
        phase: Math.random() * Math.PI * 2,
        bSpeed: 0.0015 + Math.random() * 0.001,
        bAmp: 6 + Math.random() * 10,
        dPX: Math.random() * Math.PI * 2,
        dPY: Math.random() * Math.PI * 2,
        dSX: 0.0003 + Math.random() * 0.0002,
        dSY: 0.0003 + Math.random() * 0.0002,
        dAmp: 10 + Math.random() * 15,
        opacity: 0.03 + (1 - t) * 0.045
      });
    }
  }

  function drawField() {
    var w = window.innerWidth;
    var h = fieldHeight();
    var cx = w / 2;
    var cy = h / 2;
    var depth = Math.min(conversation.length / MESSAGE_LIMIT, 1);
    var ss = 1 - depth * 0.3;
    var sp = 1 - depth * 0.4;

    if (Math.abs(ringOpacityFactor - ringOpacityTarget) > 0.001) {
      ringOpacityFactor += (ringOpacityTarget - ringOpacityFactor) * 0.14;
    } else {
      ringOpacityFactor = ringOpacityTarget;
    }

    ctx.clearRect(0, 0, w, h);

    var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 250);
    glow.addColorStop(0, 'rgba(' + ringRgb + ', 0.012)');
    glow.addColorStop(1, 'rgba(' + ringRgb + ', 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);

    for (var i = 0; i < rings.length; i++) {
      var r = rings[i];
      var breath = Math.sin(animTime * r.bSpeed * sp + r.phase) * r.bAmp;
      var radius = Math.max((r.base + breath) * ss, 10);
      var dx = Math.sin(animTime * r.dSX * sp + r.dPX) * r.dAmp;
      var dy = Math.cos(animTime * r.dSY * sp + r.dPY) * r.dAmp;

      var opacity = r.opacity * ringOpacityFactor;
      ctx.beginPath();
      ctx.arc(cx + dx, cy + dy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(' + ringRgb + ', ' + opacity + ')';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  function animate(timestamp) {
    requestAnimationFrame(animate);
    if (timestamp - frameTime < FRAME_INTERVAL) return;
    frameTime = timestamp;
    animTime++;
    drawField();
  }

  resizeCanvas();
  initRings();

  if (reducedMotion) {
    drawField();
  } else {
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', function () {
    resizeCanvas();
    requestViewportApply();
    requestDebugUpdate('window.resize');
    if (reducedMotion) drawField();
  });

  // ── Chat ──

  function begin() {
    if (started) return;
    started = true;
    disclosure.classList.add('hidden');
    messagesEl.classList.add('active');
  }

  function addMsg(role, text) {
    var el = document.createElement('div');
    el.className = 'msg msg-' + role;
    el.textContent = text;
    messagesInner.appendChild(el);
    scrollDown();
    return el;
  }

  function addSystem(text) {
    var el = document.createElement('div');
    el.className = 'msg msg-system';
    el.textContent = text;
    messagesInner.appendChild(el);
    scrollDown();
  }

  var scrollPending = false;
  function scrollDown() {
    if (scrollPending) return;
    scrollPending = true;
    requestAnimationFrame(function () {
      messagesEl.scrollTop = messagesEl.scrollHeight;
      scrollPending = false;
    });
  }

  function setEnabled(on) {
    input.disabled = !on;
    if (on && !mobile) input.focus();
  }

  if (!mobile) {
    input.focus();
  }

  function keyboardThreshold() {
    return Math.max(120, layoutViewportHeight * 0.18);
  }

  function roundMetric(value) {
    if (typeof value !== 'number' || !isFinite(value)) return null;
    return Math.round(value * 100) / 100;
  }

  function rectOf(el) {
    if (!el || !el.getBoundingClientRect) return null;
    var r = el.getBoundingClientRect();
    return {
      top: roundMetric(r.top),
      bottom: roundMetric(r.bottom),
      left: roundMetric(r.left),
      right: roundMetric(r.right),
      width: roundMetric(r.width),
      height: roundMetric(r.height)
    };
  }

  function activeElementLabel() {
    var el = document.activeElement;
    if (!el) return 'none';
    var label = el.tagName ? el.tagName.toLowerCase() : 'unknown';
    if (el.id) label += '#' + el.id;
    if (el.className && typeof el.className === 'string') label += '.' + el.className.trim().replace(/\s+/g, '.');
    return label;
  }

  function getViewportSnapshot(source) {
    var vv = window.visualViewport;
    var activeEl = document.activeElement;
    var styles = window.getComputedStyle(root);

    return {
      timestamp: new Date().toISOString(),
      source: source || debugLastSource,
      userAgent: navigator.userAgent,
      devicePixelRatio: roundMetric(window.devicePixelRatio || 1),
      window: {
        innerWidth: window.innerWidth,
        innerHeight: window.innerHeight,
        outerWidth: window.outerWidth,
        outerHeight: window.outerHeight,
        scrollX: roundMetric(window.scrollX || 0),
        scrollY: roundMetric(window.scrollY || 0)
      },
      screen: {
        width: window.screen ? window.screen.width : null,
        height: window.screen ? window.screen.height : null,
        availWidth: window.screen ? window.screen.availWidth : null,
        availHeight: window.screen ? window.screen.availHeight : null
      },
      document: {
        clientWidth: root.clientWidth,
        clientHeight: root.clientHeight,
        scrollWidth: root.scrollWidth,
        scrollHeight: root.scrollHeight,
        bodyClientWidth: document.body ? document.body.clientWidth : null,
        bodyClientHeight: document.body ? document.body.clientHeight : null,
        bodyScrollWidth: document.body ? document.body.scrollWidth : null,
        bodyScrollHeight: document.body ? document.body.scrollHeight : null
      },
      visualViewport: vv ? {
        width: roundMetric(vv.width),
        height: roundMetric(vv.height),
        offsetTop: roundMetric(vv.offsetTop || 0),
        offsetLeft: roundMetric(vv.offsetLeft || 0),
        pageTop: roundMetric(vv.pageTop || 0),
        pageLeft: roundMetric(vv.pageLeft || 0),
        scale: roundMetric(vv.scale || 1)
      } : null,
      state: {
        mobile: mobile,
        touchDevice: touchDevice,
        keyboardOpen: keyboardOpen,
        vvTop: vvTop,
        vvHeight: vvHeight,
        ringOpacityFactor: roundMetric(ringOpacityFactor),
        ringOpacityTarget: ringOpacityTarget,
        fieldHeight: fieldHeight(),
        layoutViewportHeight: layoutViewportHeight,
        cssVvTop: styles.getPropertyValue('--vv-top').trim(),
        cssVvHeight: styles.getPropertyValue('--vv-height').trim(),
        cssInputBottomPadding: styles.getPropertyValue('--input-bottom-padding').trim()
      },
      activeElement: {
        label: activeElementLabel(),
        rect: rectOf(activeEl)
      },
      elements: {
        chat: rectOf(chatEl),
        body: rectOf(bodyEl),
        disclosure: rectOf(disclosure),
        messages: rectOf(messagesEl),
        inputArea: rectOf(inputArea),
        input: rectOf(input)
      },
      messages: {
        scrollTop: roundMetric(messagesEl.scrollTop),
        clientHeight: messagesEl.clientHeight,
        scrollHeight: messagesEl.scrollHeight
      },
      input: {
        valueLength: input.value.length,
        selectionStart: input.selectionStart,
        selectionEnd: input.selectionEnd
      }
    };
  }

  function formatRectLine(label, rect) {
    if (!rect) return label + ' none';
    return label + ' t' + rect.top + ' b' + rect.bottom + ' h' + rect.height;
  }

  function renderDebugSnapshot(source) {
    if (!DEBUG_VIEWPORT || !debugPre) return;
    var snapshot = getViewportSnapshot(source);
    debugHistory.push(snapshot);
    if (debugHistory.length > 80) debugHistory.shift();
    window.__dreamDebugSnapshot = snapshot;
    window.__dreamDebugHistory = debugHistory;

    var vv = snapshot.visualViewport;
    var lines = [
      'dream viewport debug ' + new Date().toLocaleTimeString(),
      'src ' + snapshot.source + ' active ' + snapshot.activeElement.label,
      'win ' + snapshot.window.innerWidth + 'x' + snapshot.window.innerHeight + ' scrollY ' + snapshot.window.scrollY,
      vv ? ('vv ' + vv.width + 'x' + vv.height + ' offTop ' + vv.offsetTop + ' pageTop ' + vv.pageTop + ' scale ' + vv.scale) : 'vv none',
      'doc ' + snapshot.document.clientWidth + 'x' + snapshot.document.clientHeight + ' body ' + snapshot.document.bodyClientWidth + 'x' + snapshot.document.bodyClientHeight,
      'css top ' + snapshot.state.cssVvTop + ' h ' + snapshot.state.cssVvHeight + ' inputPad ' + snapshot.state.cssInputBottomPadding,
      'keyboard ' + snapshot.state.keyboardOpen + ' vvState ' + snapshot.state.vvTop + '/' + snapshot.state.vvHeight + ' fieldH ' + snapshot.state.fieldHeight,
      formatRectLine('chat', snapshot.elements.chat),
      formatRectLine('inputArea', snapshot.elements.inputArea),
      formatRectLine('input', snapshot.elements.input),
      formatRectLine('active', snapshot.activeElement.rect),
      'messages st ' + snapshot.messages.scrollTop + ' ch ' + snapshot.messages.clientHeight + ' sh ' + snapshot.messages.scrollHeight
    ];
    debugPre.textContent = lines.join('\n');
  }

  function requestDebugUpdate(source) {
    if (!DEBUG_VIEWPORT) return;
    debugLastSource = source || debugLastSource;
    if (debugRaf) return;
    debugRaf = requestAnimationFrame(function () {
      debugRaf = 0;
      renderDebugSnapshot(debugLastSource);
    });
  }

  function setupDebugPanel() {
    if (!DEBUG_VIEWPORT) return;
    debugPanel = document.createElement('div');
    debugPanel.setAttribute('aria-live', 'polite');
    debugPanel.style.cssText = 'position:fixed;z-index:99999;top:max(8px,env(safe-area-inset-top,0px));left:8px;right:8px;max-height:42vh;overflow:auto;padding:8px 10px;border:1px solid rgba(196,149,106,.45);border-radius:8px;background:rgba(0,0,0,.82);color:#d8ffb0;font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;pointer-events:auto;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);';

    var controls = document.createElement('div');
    controls.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:6px;color:#e8e4df;';
    var title = document.createElement('span');
    title.textContent = 'viewport debug';
    title.style.cssText = 'margin-right:auto;color:#e8e4df;';
    var copy = document.createElement('button');
    copy.type = 'button';
    copy.textContent = 'copy';
    copy.style.cssText = 'font:inherit;color:#e8e4df;background:transparent;border:1px solid rgba(232,228,223,.35);border-radius:4px;padding:2px 6px;';
    var hide = document.createElement('button');
    hide.type = 'button';
    hide.textContent = 'hide';
    hide.style.cssText = copy.style.cssText;
    controls.appendChild(title);
    controls.appendChild(copy);
    controls.appendChild(hide);

    debugPre = document.createElement('pre');
    debugPre.style.cssText = 'margin:0;white-space:pre-wrap;';
    debugPanel.appendChild(controls);
    debugPanel.appendChild(debugPre);
    document.body.appendChild(debugPanel);

    copy.addEventListener('click', function () {
      var snapshot = getViewportSnapshot('copy');
      var text = JSON.stringify(snapshot, null, 2);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          copy.textContent = 'copied';
          setTimeout(function () { copy.textContent = 'copy'; }, 1200);
        }).catch(function () {
          window.prompt('Copy viewport debug JSON', text);
        });
      } else {
        window.prompt('Copy viewport debug JSON', text);
      }
    });

    hide.addEventListener('click', function () {
      debugPanel.style.display = 'none';
    });

    window.__dreamDebugSnapshot = getViewportSnapshot('setup');
    window.__dreamDebugHistory = debugHistory;
    window.__dreamDebug = {
      snapshot: function () { return getViewportSnapshot('console'); },
      history: debugHistory,
      refresh: function () { renderDebugSnapshot('manual'); }
    };

    requestDebugUpdate('setup');
    window.setInterval(function () { requestDebugUpdate('tick'); }, 500);
  }

  function applyViewport() {
    viewportRaf = 0;
    var top = 0;
    var height = window.innerHeight;

    var oldLayoutViewportHeight = layoutViewportHeight;

    if (window.visualViewport) {
      var vv = window.visualViewport;
      top = Math.max(0, vv.offsetTop || 0);
      height = vv.height || window.innerHeight;
      layoutViewportHeight = Math.max(layoutViewportHeight, window.innerHeight, height + top);
    } else {
      layoutViewportHeight = Math.max(layoutViewportHeight, window.innerHeight);
    }

    if (layoutViewportHeight !== oldLayoutViewportHeight) {
      resizeCanvas();
    }

    vvTop = Math.round(top);
    vvHeight = Math.round(height);
    keyboardOpen = touchDevice && !!window.visualViewport && ((layoutViewportHeight - vvHeight > keyboardThreshold()) || (vvTop > 40));
    ringOpacityTarget = keyboardOpen ? 0.5 : 1;

    root.style.setProperty('--vv-top', vvTop + 'px');
    root.style.setProperty('--vv-height', vvHeight + 'px');
    root.style.setProperty('--input-bottom-padding', keyboardOpen ? '8px' : 'max(24px, env(safe-area-inset-bottom, 24px))');

    requestDebugUpdate('applyViewport');
    scrollDown();

    if (reducedMotion) {
      ringOpacityFactor = ringOpacityTarget;
      drawField();
    }
  }

  function requestViewportApply() {
    if (viewportRaf) return;
    viewportRaf = requestAnimationFrame(applyViewport);
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', requestViewportApply);
    window.visualViewport.addEventListener('scroll', requestViewportApply);
  }
  requestViewportApply();
  setupDebugPanel();

  window.addEventListener('scroll', function () {
    requestDebugUpdate('window.scroll');
  }, { passive: true });

  input.addEventListener('focus', function () {
    requestViewportApply();
    requestDebugUpdate('input.focus');
    setTimeout(function () { requestDebugUpdate('input.focus+250'); }, 250);
    setTimeout(function () { requestDebugUpdate('input.focus+700'); }, 700);
  });

  input.addEventListener('blur', function () {
    requestViewportApply();
    requestDebugUpdate('input.blur');
    setTimeout(function () { requestDebugUpdate('input.blur+250'); }, 250);
  });

  var touchScrollTarget = null;
  var lastTouchY = 0;

  function closestMessagesElement(target) {
    while (target && target !== document) {
      if (target === messagesEl) return messagesEl;
      target = target.parentNode;
    }
    return null;
  }

  document.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) {
      touchScrollTarget = null;
      return;
    }
    lastTouchY = e.touches[0].clientY;
    touchScrollTarget = closestMessagesElement(e.target);
    requestDebugUpdate(touchScrollTarget ? 'touchstart.messages' : 'touchstart.locked');
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (e.defaultPrevented || e.touches.length !== 1) return;

    var y = e.touches[0].clientY;
    var deltaY = y - lastTouchY;
    lastTouchY = y;

    if (!touchScrollTarget) {
      e.preventDefault();
      requestDebugUpdate('touchmove.preventOutside');
      return;
    }

    var maxScroll = touchScrollTarget.scrollHeight - touchScrollTarget.clientHeight;
    if (maxScroll <= 0) {
      e.preventDefault();
      requestDebugUpdate('touchmove.preventNoScroll');
      return;
    }

    var nextScrollTop = touchScrollTarget.scrollTop - deltaY;
    if (nextScrollTop < 0) {
      touchScrollTarget.scrollTop = 0;
      e.preventDefault();
      requestDebugUpdate('touchmove.preventTop');
    } else if (nextScrollTop > maxScroll) {
      touchScrollTarget.scrollTop = maxScroll;
      e.preventDefault();
      requestDebugUpdate('touchmove.preventBottom');
    } else {
      requestDebugUpdate('touchmove.messages');
    }
  }, { passive: false });

  input.addEventListener('input', function () {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    requestDebugUpdate('input.input');
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    submit();
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  });

  function submit() {
    if (streaming) return;

    var text = input.value.trim();
    if (!text) return;
    if (text.length > CHAR_LIMIT) text = text.slice(0, CHAR_LIMIT);

    if (conversation.length >= MESSAGE_LIMIT) {
      addSystem('This conversation has reached its depth for one sitting.');
      setEnabled(false);
      return;
    }

    begin();

    input.value = '';
    input.style.height = 'auto';

    var userEl = addMsg('user', text);
    conversation.push({ role: 'user', content: text });

    streaming = true;
    setEnabled(false);

    streamResponse(userEl);
  }

  async function streamResponse(userEl) {
    var el = document.createElement('div');
    el.className = 'msg msg-assistant';
    messagesInner.appendChild(el);
    scrollDown();

    var fullText = '';

    try {
      var res = await fetch('/api/dream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      while (true) {
        var result = await reader.read();
        if (result.done) break;

        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data: ')) continue;
          var data = line.slice(6);
          if (data === '[DONE]') continue;

          try {
            var parsed = JSON.parse(data);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.delta) {
              fullText += parsed.delta;
              el.textContent = fullText;
              scrollDown();
            }
          } catch (parseErr) {
            if (parseErr.message !== 'Something went wrong') continue;
            throw parseErr;
          }
        }
      }
    } catch (err) {
      // handled below
    }

    if (fullText) {
      conversation.push({ role: 'assistant', content: fullText });
    } else {
      el.remove();
      userEl.remove();
      conversation.pop();
      addSystem('Something flickered. Try again.');
    }

    streaming = false;

    if (conversation.length >= MESSAGE_LIMIT) {
      addSystem('This conversation has gone deep enough for one sitting.');
      setEnabled(false);
    } else {
      setEnabled(true);
    }
  }
})();
</script>

</body>
</html>
