<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article editor | What are we capable of?</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/site.css">
  <link rel="stylesheet" href="../studio.css">
</head>
<body class="page-editorial page-editorial-editor" data-editorial-page="editor">
  <a class="skip-link" href="#editor">Skip to article editor</a>
  <main class="editorial-workspace-shell">
    <header class="editorial-header editorial-header-editor">
      <div>
        <a class="editorial-mark" href="/">What are we capable of?</a>
        <a class="editorial-back" href="../">Editorial Studio</a>
      </div>
      <div class="editorial-actions">
        <button id="download-draft" class="quiet-action" type="button">Download draft</button>
        <button id="reset-draft" class="quiet-action" type="button">Reset published copy</button>
      </div>
    </header>

    <p id="editorial-status" class="editorial-status editorial-status-editor" aria-live="polite">Loading article</p>

    <div class="editorial-workspace">
      <aside class="outline-pane" aria-labelledby="outline-heading">
        <p id="outline-heading" class="pane-label">Sections</p>
        <nav id="outline" aria-label="Article sections"></nav>
      </aside>

      <section class="editor-pane" aria-labelledby="editor-heading">
        <header class="pane-header">
          <div>
            <p id="editor-heading" class="pane-label">Edit copy</p>
            <p class="pane-note">Draft saves on this device</p>
          </div>
        </header>
        <div id="editor-scroll" class="editor-scroll">
          <article id="editor" class="editor-document" contenteditable="true" spellcheck="true" aria-label="Editable article draft"></article>
        </div>
      </section>

      <section class="preview-pane" aria-labelledby="preview-heading">
        <header class="pane-header">
          <div>
            <p id="preview-heading" class="pane-label">Rendered page</p>
            <p class="pane-note">WAWCO CSS follows edit position</p>
          </div>
        </header>
        <iframe id="preview" title="Rendered WAWCO article preview" sandbox="allow-same-origin" referrerpolicy="no-referrer"></iframe>
      </section>
    </div>
  </main>
  <script src="../articles.js"></script>
  <script src="../studio.js"></script>
</body>
</html>
