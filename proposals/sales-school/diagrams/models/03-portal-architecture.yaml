    title: Current WAWCO portal architecture SVG
    sourceType: generated SVG
    date: 2026-04-27
    path: ~/Projects/whatarewecapableof/proposals/sales-school/diagrams/svg/03-portal-architecture.svg
    confidence: observed
    notes: Current generated image diagram used as the visual comparison target for this toolchain retry.
  - id: evidence-generator
    title: WAWCO SVG generator
    sourceType: local generator source
    date: 2026-04-27
    path: ~/Projects/whatarewecapableof/proposals/sales-school/diagrams/src/generate-diagrams.py
    confidence: observed
    notes: Defines the current custom WAWCO rendering of the portal architecture.
  - id: evidence-live-proposal
    title: Sales School proposal source
