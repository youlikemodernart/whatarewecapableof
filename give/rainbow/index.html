<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="refresh" content="0; url=https://www.paypal.com/donate/?hosted_button_id=HNTQHHHGYS77Q" />
  <link rel="canonical" href="https://www.paypal.com/donate/?hosted_button_id=HNTQHHHGYS77Q" />
  <title>Rainbow Gathering support | Gathering Ministries</title>
  <style>
    :root {
      color-scheme: light;
      --text: #111111;
      --muted: rgba(17, 17, 17, 0.62);
      --rule: rgba(17, 17, 17, 0.14);
      --bg: #faf9f6;
      --button: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(100% - 48px, 560px);
      padding: 40px;
      border: 1px solid var(--rule);
      background: #ffffff;
    }

    p { margin: 0 0 18px; }

    .eyebrow {
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.02;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    a.button {
      display: inline-block;
      margin-top: 8px;
      padding: 13px 18px;
      border-radius: 999px;
      background: var(--button);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    .fallback {
      margin-top: 22px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
  <script>
    window.location.replace("https://www.paypal.com/donate/?hosted_button_id=HNTQHHHGYS77Q");
  </script>
</head>
<body>
  <main>
    <p class="eyebrow">Gathering Ministries</p>
    <h1>Rainbow Gathering support</h1>
    <p>You are being redirected to the PayPal donation page for Gathering Ministries.</p>
    <p><a class="button" href="https://www.paypal.com/donate/?hosted_button_id=HNTQHHHGYS77Q">Continue to PayPal</a></p>
    <p class="fallback">If the redirect does not open, use the button above.</p>
  </main>
</body>
</html>
