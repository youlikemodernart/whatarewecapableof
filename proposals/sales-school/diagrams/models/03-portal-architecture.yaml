legend:
  - mark: plain hierarchy connector
    meaning: parent child page structure in the proposed MVP portal
    redundantCue: contains relation in the text equivalent and relation table
  - mark: WAWCO blue accent
    meaning: the live Today surface is the selected state surface in this architecture view
    redundantCue: Live surface label
  - mark: kept media layer band
    meaning: Wistia remains the media layer outside the page hierarchy
    redundantCue: Kept media layer label
  - mark: dashed optional later band
    meaning: feature is outside MVP and belongs to later platform scope
    redundantCue: Optional later label
accessibility:
  summary: The proposed Sales School portal architecture starts with Course home at /sales-school. It contains Today, Day One, Day Two, Resources, and Facilitator. Day One contains Breakouts 1 through 3, Day Two contains Breakouts 4 through 6, Wistia remains the media layer, and search, progress, admin editing, cohorts, and login are optional later scope.
  readingPath:
    - Start at Course home as the root page.
    - Read Today, Day One, Day Two, Resources, and Facilitator as first-build peer sections.
    - Read Breakouts 1 through 3 under Day One and Breakouts 4 through 6 under Day Two.
    - Read the kept media layer band as Wistia remaining outside the page hierarchy.
    - Read the optional later band as platform features outside MVP scope.
    - Use the relation table to check the source and confidence of each relation.
  textEquivalent: The MVP portal has Course home at /sales-school. Course home contains Today, Day One, Day Two, Resources, and Facilitator. Today is the live-session surface. Day One contains Breakouts 1, 2, and 3. Day Two contains Breakouts 4, 5, and 6. Each breakout page uses media from Wistia. Search, progress, admin editing, cohorts, and login are optional later features rather than MVP pages.
  relationTable:
    - relation-home-contains-today
    - relation-home-contains-day-one
    - relation-home-contains-day-two
    - relation-home-contains-resources
    - relation-home-contains-facilitator
    - relation-day-one-contains-breakout-1
    - relation-day-one-contains-breakout-2
    - relation-day-one-contains-breakout-3
    - relation-day-two-contains-breakout-4
    - relation-day-two-contains-breakout-5
    - relation-day-two-contains-breakout-6
    - relation-breakout-1-uses-wistia
    - relation-breakout-2-uses-wistia
    - relation-breakout-3-uses-wistia
    - relation-breakout-4-uses-wistia
    - relation-breakout-5-uses-wistia
    - relation-breakout-6-uses-wistia
    - relation-home-defers-search
    - relation-home-defers-progress
    - relation-home-defers-admin-editing
    - relation-home-defers-cohorts
    - relation-home-defers-login
notes:
  - This is a survey view, not the live-break flow.
  - Graphviz output is a structure draft. The current WAWCO SVG generator remains the visual rendering layer for proposal images.
  - The model intentionally keeps transcript indexing out of the visible optional-later list for this diagram retry.
