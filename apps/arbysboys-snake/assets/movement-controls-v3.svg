<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Movement controls</title>
  <desc id="desc">Arrow key cluster and tapping hand indicating keyboard, touch, or swipe movement.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#6d0000" flood-opacity="0.35"/>
    </filter>
    <style>
      .key{fill:#fff;stroke:#c6322d;stroke-width:5;filter:url(#shadow)}
      .arrow{fill:none;stroke:#c6322d;stroke-width:12;stroke-linecap:round;stroke-linejoin:round}
      .hand{fill:#fff;stroke:#c6322d;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;filter:url(#shadow)}
      .tap{fill:none;stroke:#fff;stroke-width:8;stroke-linecap:round;opacity:.9}
    </style>
  </defs>
  <g transform="translate(28 24)">
    <rect class="key" x="134" y="0" width="112" height="94" rx="22"/>
    <rect class="key" x="0" y="112" width="112" height="94" rx="22"/>
    <rect class="key" x="134" y="112" width="112" height="94" rx="22"/>
    <rect class="key" x="268" y="112" width="112" height="94" rx="22"/>
    <path class="arrow" d="M190 26 L160 66 H220 Z"/>
    <path class="arrow" d="M190 182 L160 142 H220 Z"/>
    <path class="arrow" d="M34 159 L78 130 V188 Z"/>
    <path class="arrow" d="M346 159 L302 130 V188 Z"/>
  </g>
  <path class="hand" d="M432 344 C389 344 350 320 329 284 L303 240 C295 227 299 211 312 203 C326 195 342 200 350 213 L365 238 L365 108 C365 88 380 73 399 73 C418 73 433 88 433 108 L433 223 L443 202 C452 184 473 178 490 188 C503 196 509 211 506 225 L514 213 C524 198 545 194 560 205 C574 215 578 234 569 249 L561 262 C576 257 594 263 602 278 C611 294 605 313 590 322 L525 361 C499 376 467 374 432 344 Z"/>
  <path class="tap" d="M480 44 C500 32 527 32 548 45"/>
  <path class="tap" d="M468 20 C499 -3 544 -2 576 22"/>
</svg>
