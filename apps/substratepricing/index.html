const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const matchQualityGrouping = Boolean(DATA.ui?.group_by_match_quality);
const defaultSort = matchQualityGrouping ? 'match' : 'risk';
let state = { tier: 'all', search: '', collection: 'all', match: 'all', sort: defaultSort };
const tierLabels = {
  below: 'Competitors priced below',
  at_or_above: 'Competitors priced at or above',
  no_verified: 'No verified competitors yet',
  price_needs_check: 'Kaitlyn price needs check'
};
const tierOrder = { below: 0, at_or_above: 1, no_verified: 2, price_needs_check: 3 };
const matchGroupLabels = {
  strong: 'Strong candidate matches',
  possible: 'Manual review reference candidates',
  no_verified: 'No verified competitors yet',
  price_needs_check: 'Kaitlyn price needs check'
};
const matchGroupDescriptions = {
  strong: 'Rows in this section have the strongest product, source, image, or source-family signals. Reference rows for the same tile stay inside the tile card below the strong row.',
  possible: 'Manual review note: most rows in this section should not be treated as product matches. They remain here as process evidence and as reference for tiles where a clear online competitor was not found.',
  no_verified: 'These tiles still have no source-backed competitor price ready for client review.',
  price_needs_check: 'These tiles need a Substrate price check before competitor comparison.'
};
const matchGroupOrder = { strong: 0, possible: 1, no_verified: 2, price_needs_check: 3 };

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function money(n) {
  return Number.isFinite(n) ? `${n < 0 ? '-' : ''}$${Math.abs(n).toFixed(2)}` : 'Unknown';
}
function link(url, text) {
  return url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(text)} <span class="visually-hidden">opens in new tab</span></a>` : '';
}
function displayMatchLabel(c) {
  if (matchQualityGrouping && c.match_label === 'Possible match') return 'Reviewed reference';
  return c.match_label;
}

function init() {
  renderSummary();
  populateFilters();
  $('#sortFilter').value = state.sort;
  renderFooter();
  bind();
  render();
}

function renderSummary() {
  const s = DATA.summary;
  const below = s.product_counts_by_tier.below || 0;
  const above = s.product_counts_by_tier.at_or_above || 0;
  const pending = s.product_counts_by_tier.no_verified || 0;
  const priceCheck = s.product_counts_by_tier.price_needs_check || 0;
  const strong = s.competitor_counts_by_match?.['Strong match'] || 0;
  const possible = s.competitor_counts_by_match?.['Possible match'] || 0;
  const items = matchQualityGrouping
    ? [
      [s.product_count, 'tiles'],
      [strong, 'strong rows'],
      [possible, 'review reference rows'],
      [pending, 'no verified competitor']
    ]
    : [
      [s.product_count, 'tiles'],
      [s.competitor_count, 'competitor rows'],
      [below, 'priced below'],
      [above, 'at or above'],
      [pending, 'no verified competitor']
    ];
  if (priceCheck) items.push([priceCheck, 'price check']);
  $('#summaryStrip').innerHTML = items
    .map(([n, label]) => `<span><span class="num">${escapeHtml(n)}</span> ${escapeHtml(label)}</span>`)
    .join('');
}

function renderFooter() {
  const s = DATA.summary;
  const date = s.built_at ? new Date(s.built_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
  if (matchQualityGrouping) {
    const strong = s.competitor_counts_by_match?.['Strong match'] || 0;
    const possible = s.competitor_counts_by_match?.['Possible match'] || 0;
    $('#pageFooter').textContent = `Produced ${date}. ${s.product_count} tiles reviewed. ${strong} strong source-backed price rows. ${possible} manual review reference rows.`;
    return;
  }
  $('#pageFooter').textContent = `Produced ${date}. ${s.product_count} tiles reviewed. ${s.competitor_count} source-backed competitor prices.`;
}

function populateFilters() {
  const collections = ['all', ...new Set(DATA.products.map(p => p.collection).filter(Boolean).sort())];
  $('#collectionFilter').innerHTML = collections
    .map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v === 'all' ? 'All' : v)}</option>`)
    .join('');
  if (matchQualityGrouping) {
    const possibleOption = $('#matchFilter option[value="Possible match"]');
    if (possibleOption) possibleOption.textContent = 'Reference';
  }
}

function bind() {
  $('#search').addEventListener('input', e => { state.search = e.target.value; render(); });
  $('#collectionFilter').addEventListener('change', e => { state.collection = e.target.value; render(); });
  $('#matchFilter').addEventListener('change', e => { state.match = e.target.value; render(); });
  $('#sortFilter').addEventListener('change', e => { state.sort = e.target.value; render(); });
  $('#resetFilters').addEventListener('click', reset);
  $('#tierButtons').addEventListener('click', e => {
    const btn = e.target.closest('button[data-tier]');
    if (!btn) return;
    state.tier = btn.dataset.tier;
    $$('#tierButtons button').forEach(b => b.setAttribute('aria-pressed', String(b === btn)));
    render();
  });
  document.addEventListener('keydown', e => {
    if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
      e.preventDefault();
      $('#search').focus();
    }
    if (e.key === 'Escape') {
      if ($('#search') === document.activeElement && $('#search').value) {
        $('#search').value = '';
        state.search = '';
        render();
      }
    }
  });
}

function reset() {
  state = { tier: 'all', search: '', collection: 'all', match: 'all', sort: defaultSort };
  $('#search').value = '';
  $('#collectionFilter').value = 'all';
  $('#matchFilter').value = 'all';
  $('#sortFilter').value = defaultSort;
  $$('#tierButtons button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.tier === 'all')));
  render();
}

function matchingCompetitors(p) {
  if (state.match === 'all') return p.competitors;
  return p.competitors.filter(c => c.match_label === state.match);
}

function productMatchGroup(p) {
  const comps = matchingCompetitors(p);
  if (!comps.length) return p.tier === 'price_needs_check' ? 'price_needs_check' : 'no_verified';
  if (comps.some(c => c.match_label === 'Strong match')) return 'strong';
  return 'possible';
}

function filteredProducts() {
  return DATA.products.filter(p => {
    if (state.tier !== 'all' && p.tier !== state.tier) return false;
    if (state.collection !== 'all' && p.collection !== state.collection) return false;
    if (state.match !== 'all' && !matchingCompetitors(p).length) return false;
    const q = state.search.trim().toLowerCase();
    if (q) {
      const hay = [p.sku, p.collection, p.color_or_variant, p.format, p.product_title,
        p.variant_title, p.display_name,
        ...p.competitors.flatMap(c => [c.host, c.title, c.source_product_name])
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => {
    if (state.sort === 'match') {
      return (matchGroupOrder[productMatchGroup(a)] ?? 9) - (matchGroupOrder[productMatchGroup(b)] ?? 9)
        || (a.min_diff ?? 9999) - (b.min_diff ?? 9999)
        || String(a.sku).localeCompare(String(b.sku));
    }
    if (state.sort === 'gap') return (a.min_diff ?? 9999) - (b.min_diff ?? 9999);
    if (state.sort === 'collection') return String(a.collection).localeCompare(String(b.collection)) || String(a.sku).localeCompare(String(b.sku));
    if (state.sort === 'sku') return String(a.sku).localeCompare(String(b.sku));
    return (tierOrder[a.tier] ?? 9) - (tierOrder[b.tier] ?? 9)
      || (matchGroupOrder[productMatchGroup(a)] ?? 9) - (matchGroupOrder[productMatchGroup(b)] ?? 9)
      || (a.min_diff ?? 9999) - (b.min_diff ?? 9999)
      || String(a.sku).localeCompare(String(b.sku));
  });
}

function render() {
  const rows = filteredProducts();
  const strong = DATA.summary.competitor_counts_by_match?.['Strong match'] || 0;
  const possible = DATA.summary.competitor_counts_by_match?.['Possible match'] || 0;
  $('#resultNotice').textContent = matchQualityGrouping
    ? `${rows.length} tiles shown. ${strong} strong rows. ${possible} manual review reference rows.`
    : `${rows.length} tiles shown. ${DATA.summary.competitor_count} source-backed competitor rows.`;
  const groups = {};
  if (matchQualityGrouping) {
    for (const p of rows) (groups[productMatchGroup(p)] ||= []).push(p);
    const order = ['strong', 'possible', 'no_verified', 'price_needs_check'];
    $('#productGroups').innerHTML = order
      .filter(t => groups[t]?.length)
      .map(t => renderMatchQualityGroup(t, groups[t]))
      .join('')
      || '<p class="empty">No tiles match the current filters.</p>';
    return;
  }
  for (const p of rows) (groups[p.tier] ||= []).push(p);
  const order = ['below', 'at_or_above', 'no_verified', 'price_needs_check'];
  $('#productGroups').innerHTML = order
    .filter(t => groups[t]?.length)
    .map(t => renderGroup(t, groups[t]))
    .join('')
    || '<p class="empty">No tiles match the current filters.</p>';
}

function renderGroup(tier, products) {
  const isCompact = tier === 'no_verified' || tier === 'price_needs_check';
  const inner = isCompact
    ? products.map(renderCompactProduct).join('')
    : products.map(renderProduct).join('');
  return `<section class="tier-group">
    <h2>${escapeHtml(tierLabels[tier])} (${products.length})</h2>
    ${isCompact ? '<div class="compact-list">' + inner + '</div>' : inner}
  </section>`;
}

function renderMatchQualityGroup(group, products) {
  const isCompact = group === 'no_verified' || group === 'price_needs_check';
  const rowCount = isCompact ? 0 : products.reduce((sum, p) => sum + matchingCompetitors(p).length, 0);
  const countLabel = isCompact
    ? `${products.length}`
    : `${products.length} ${products.length === 1 ? 'tile' : 'tiles'}, ${rowCount} ${rowCount === 1 ? 'row' : 'rows'}`;
  const inner = isCompact
    ? products.map(renderCompactProduct).join('')
    : products.map(renderProduct).join('');
  return `<section class="match-quality-group match-quality-${escapeHtml(group)}">
    <div class="match-quality-heading">
      <h2>${escapeHtml(matchGroupLabels[group])} (${escapeHtml(countLabel)})</h2>
      <p class="match-quality-copy">${escapeHtml(matchGroupDescriptions[group])}</p>
    </div>
    ${isCompact ? '<div class="compact-list">' + inner + '</div>' : inner}
  </section>`;
}

function renderProduct(p) {
  const bestDiff = Number.isFinite(p.min_diff)
    ? `Best gap: ${money(p.min_diff)} / SF`
    : '';
  const displayedCompetitors = matchingCompetitors(p);
  const compCount = displayedCompetitors.length;
  const strongCount = displayedCompetitors.filter(c => c.match_label === 'Strong match').length;
  const possibleCount = displayedCompetitors.filter(c => c.match_label === 'Possible match').length;
  const guidanceParts = [];
  if (strongCount) guidanceParts.push(`${strongCount} strong ${strongCount === 1 ? 'candidate' : 'candidates'}`);
  if (possibleCount) guidanceParts.push(`${possibleCount} manual review ${possibleCount === 1 ? 'reference' : 'references'}`);
  const guidance = compCount
    ? `Showing ${guidanceParts.join(' and ')} for this tile.`
    : 'No source-backed competitor price has been verified for this tile yet.';

  const competitorRows = renderCompetitorSections(displayedCompetitors, p);

  return `<article class="product" data-sku="${escapeHtml(p.sku)}">
    <div class="product-top">
      ${p.image_url
        ? `<div class="product-img"><img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.display_name)}" loading="lazy"></div>`
        : '<div class="product-img"></div>'
      }
      <div>
        <p class="product-meta">${escapeHtml(p.sku)} · ${escapeHtml(p.collection)} · ${escapeHtml(p.format)}</p>
        <h3>${escapeHtml(p.display_name)}</h3>
        <p class="product-price-line">${escapeHtml(p.substrate_price_label || 'Price check needed')}${bestDiff ? ` <span class="diff-inline">${escapeHtml(bestDiff)}</span>` : ''}</p>
        <p class="product-link">${link(p.product_url, 'Substrate product page')}</p>
      </div>
    </div>
    <p class="product-guidance">${escapeHtml(guidance)}</p>
    ${competitorRows ? `<div class="competitors">${competitorRows}</div>` : ''}
  </article>`;
}

function renderCompetitorSections(comps, p) {
  const labels = ['Strong match', 'Possible match', 'Visual comp'];
  const groups = labels
    .map(label => [label, comps.filter(c => c.match_label === label)])
    .filter(([, rows]) => rows.length);
  const showSectionHeadings = groups.length > 1;
  return groups.map(([label, rows]) => {
    const key = label === 'Strong match' ? 'strong' : label === 'Possible match' ? 'possible' : 'visual';
    const rowHtml = rows.map(c => renderCompetitorRow(c, p)).join('');
    if (!showSectionHeadings) return rowHtml;
    return `<div class="candidate-section candidate-section-${key}">
      <div class="candidate-section-heading"><span>${escapeHtml(label === 'Strong match' ? 'Strong candidates' : 'Manual review references')}</span><span class="candidate-section-count">${rows.length}</span></div>
      ${rowHtml}
    </div>`;
  }).join('');
}

function renderCompetitorRow(c, p) {
  const diff = Number.isFinite(c.price_diff) ? `${money(c.price_diff)} / SF` : '';
  const attrs = [c.source_dimensions, c.source_finish, c.source_material].filter(Boolean);
  const attrStr = attrs.length ? attrs.join(' · ') : '';
  const matchKey = c.match_label === 'Strong match' ? 'strong' : c.match_label === 'Possible match' ? 'possible' : 'visual';

  const kwImgEl = p.image_url
    ? `<div><img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.display_name)}" loading="lazy"><span class="pair-label">Substrate</span></div>`
    : '';
  const compImgEl = c.source_image_url
    ? `<div><img src="${escapeHtml(c.source_image_url)}" alt="Competitor tile from ${escapeHtml(c.host)}" loading="lazy"><span class="pair-label">${escapeHtml(c.host)}</span></div>`
    : '';
  const showPair = kwImgEl || compImgEl;

  return `<section class="competitor-row competitor-row-${matchKey}" data-match="${escapeHtml(c.match_label)}">
    ${showPair ? `<div class="image-pair">${kwImgEl}${compImgEl}</div>` : '<div></div>'}
    <div class="comp-info">
      <p class="comp-host">${escapeHtml(c.host)} · <span class="match-tier match-tier-${matchKey}">${escapeHtml(displayMatchLabel(c))}</span></p>
      <h4>${escapeHtml(c.source_product_name || c.title || 'Source product')}</h4>
      ${attrStr ? `<p class="comp-attrs">${escapeHtml(attrStr)}</p>` : ''}
      <p class="comp-links">${link(c.url, 'Source')}</p>
      ${c.review_reason ? `<span class="comp-evidence">${escapeHtml(c.review_reason)}</span>` : ''}
    </div>
    <div class="comp-price-block">
      <div class="comp-price-val">${escapeHtml(c.evidence_unit_price || '')}</div>
      <div class="comp-price-basis">/ ${escapeHtml(String(c.evidence_unit_basis || 'per SF').replace(/^per\s+/i, ''))}</div>
      ${diff ? `<div class="comp-price-diff">${escapeHtml(diff)}</div>` : ''}
    </div>
  </section>`;
}

function renderCompactProduct(p) {
  return `<div class="product-compact">
    ${p.image_url
      ? `<div class="compact-img"><img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.display_name)}" loading="lazy"></div>`
      : '<div class="compact-img"></div>'
    }
    <div>
      <p class="compact-meta">${escapeHtml(p.sku)} · ${escapeHtml(p.collection)} · ${escapeHtml(p.format)}</p>
      <h3>${escapeHtml(p.display_name)}</h3>
      <p class="compact-price">${escapeHtml(p.substrate_price_label || 'Price check needed')}</p>
      <p class="compact-status">No source-backed competitor price verified yet.</p>
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
