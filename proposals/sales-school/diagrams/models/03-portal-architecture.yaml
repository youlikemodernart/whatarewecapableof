id: sales-school-portal-architecture
title: Proposed Sales School portal architecture
claim: The MVP portal turns the existing Sales School material into a course place with a live Today surface, two day sections, six breakout pages, Resources, Facilitator, and Wistia kept as the media layer.
audience: Austin and proposal reviewers
state: proposed MVP
perspective: survey
scale: structure
timescale: proposed first build
delivery: browser review and WAWCO SVG generator comparison
scope: Proposed first-build portal architecture and adjacent later-scope features.
omissions:
  - payment
  - CRM administration
  - lesson-level page expansion
  - transcript indexing in the visible diagram
  - support triage detail
  - exact login policy
visualQueries:
  - Find Course home as the root of the proposed portal.
  - See Today as the live-session surface, not a generic dashboard.
  - See Day One and Day Two as peer course sections.
  - Confirm that six breakout pages sit under the two day sections.
  - See Resources and Facilitator as first-build peer support pages.
  - Confirm that Wistia remains the media layer.
  - Keep optional later features separate from MVP scope.
states:
  - id: proposed-mvp
    label: Proposed MVP
    definition: Included in the proposed first build of the course portal.
    visualCue: black rule with plain page node
    textCue: Proposed MVP label or first-build section placement
  - id: live-surface
    label: Live surface
    definition: First-build page whose job is current-session access during Zoom breaks.
    visualCue: WAWCO blue accent on the Today node
    textCue: Live surface label
  - id: kept-media-layer
    label: Kept media layer
    definition: Existing Wistia-hosted media remains outside the page hierarchy but is organized by the portal.
    visualCue: kept media layer band
    textCue: Kept media layer label
  - id: optional-later
    label: Optional later
    definition: Platform features outside the first-build portal scope.
    visualCue: dashed optional later band
    textCue: Optional later label
evidence:
