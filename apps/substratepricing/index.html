    <div>${c.source_image_url ? `<img src="${escapeHtml(c.source_image_url)}" alt="Competitor tile from ${escapeHtml(c.host)}" loading="lazy">` : ''}</div>
    <div>
      <p class="meta">${escapeHtml(c.host)} · ${escapeHtml(c.match_label)}</p>
      <h4>${escapeHtml(c.source_product_name || c.title || 'Source product')}</h4>
      <p>${link(c.url, 'Source')}</p>
      <div class="pill-row">
        ${c.source_dimensions ? `<span class="pill">${escapeHtml(c.source_dimensions)}</span>` : ''}
        ${c.source_finish ? `<span class="pill">${escapeHtml(c.source_finish)}</span>` : ''}
        ${c.source_material ? `<span class="pill">${escapeHtml(c.source_material)}</span>` : ''}
      </div>
      <details><summary>Evidence note</summary><div class="context">${escapeHtml(c.review_reason || c.evidence_method || 'Source page price extracted as dollars per square foot.')}\nObserved: ${escapeHtml(c.evidence_source_date || 'Unknown')}</div></details>
    </div>
    <div class="comp-price">
      <div class="price">${escapeHtml(c.evidence_unit_price || '')}</div>
      <div class="meta">/ ${escapeHtml(String(c.evidence_unit_basis || 'per SF').replace(/^per\s+/i, ''))}</div>
      <div class="diff">${escapeHtml(diff)}</div>
    </div>
  </section>`;
}
init();
</script>
</body>
</html>
